# ─────────────────────────────────────────────────────────────────────
# user_extensions: user 在 Instance root 加自訂議題（範例註解）
# ─────────────────────────────────────────────────────────────────────
# 範例：恐怖類專案加「驚悚密度曲線」議題到 00_h_detailed_outline
#   00_h_detailed_outline:
#     - id: 100                            # user 自訂 ID 從 100 起跳避免與 core 衝突
#       name: 驚悚密度曲線
#       required_level: STRONGLY_PREFERRED
#       locked: false                      # user 加的議題永遠 locked=false
#       question_summary: "全作各章節驚悚密度標籤（淡/中/濃/極濃）+ 密度曲線希望樣式"
#       protocol_ref: "user-defined"

user_extensions:
  00_e_world: []
  00_f_character: []
  00_g_outline: []
  00_h_detailed_outline: []
  00_l_relationship: []
  00_n_organization: []

# ─────────────────────────────────────────────────────────────────────
# core_overrides: user 標 SKIP 既有 core 議題（只能標 locked=false 議題）
# ─────────────────────────────────────────────────────────────────────
# 範例：純愛遊戲跳過議題 5（價值觀）、議題 6（宗教）
#   00_e_world:
#     - skip_id: 5
#       reason: "純愛主題，價值觀僅在後期擴充時考量"
#     - skip_id: 6
#       reason: "無宗教設定"
#
# 若 user 嘗試 skip locked=true 議題（如 00_e_world id=1 世界類型快速分類），
# parser 應忽略該 skip 條目並聚合 WARN 到 RepoIndex.issues。

core_overrides:
  00_e_world: []
  00_f_character: []
  00_g_outline: []
  00_h_detailed_outline: []
  00_l_relationship: []
  00_n_organization: []
