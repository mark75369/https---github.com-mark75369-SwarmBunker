      - 00_protocol/00_f_角色創建協議.md
      - 00_protocol/00_g_大綱創建協議.md
      - 00_protocol/00_h_細綱創建協議.md
      - 00_protocol/00_i_專案初始化協議.md
      - 00_protocol/00_k_台詞生產流程協議.md
      - 00_protocol/00_l_關係創建協議.md

  character_templates:
    reason: "Template files do not represent actual character instances."
    paths:
      - 03_characters/03_b_主要角色聲線卡模板.md
      - 03_characters/03_c_次要角色與npc模板.md
