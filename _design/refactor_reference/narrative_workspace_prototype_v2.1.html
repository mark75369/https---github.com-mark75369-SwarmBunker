<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Narrative Workspace Prototype — v2.1 (single-file reference for refactor)</title>

  <!-- =========================================================================
       Narrative Workspace Prototype — v2.1 (single-file reference for refactor)
       -------------------------------------------------------------------------
       本檔是 self-contained HTML：原本拆成 index.html + mock_data.js + README.md
       + prototype_notes.md 四檔；此版本把 mock_data.js inline 進來，給新重構專
       案的對話作為「一個檔就能完整看到 prototype」的參考檔。
       
       對應的 UI/UX 規格說明（含設計決策、重構候選等）：UI_UX_SPEC.md
       對應的原始 4 檔結構：game-dialogue-bible/_prototypes/ux/narrative_workspace/
       
       使用：用任何現代瀏覽器直開即可（不需 server / build）。
       ========================================================================= -->

  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --surface-alt: #f9fafc;
      --surface-hover: #fafbff;
      --border: #e2e5ec;
      --border-strong: #cbd1dd;
      --text: #1f2937;
      --muted: #6b7280;
      --subtle: #9ca3af;
      --primary: #4a6cf7;
      --primary-hover: #3957d8;
      --primary-soft: #eef1ff;
      --primary-soft-border: #d2dcff;
      --warning: #b8860b;
      --warning-bg: #fff7e6;
      --warning-border: #f5d28a;
      --warning-text: #6b4f00;
      --warning-text-strong: #5a3e00;
      --danger: #c94a4a;
      --danger-bg: #fdecec;
      --danger-border: #f3c4c4;
      --success: #0f9b6e;
      --success-bg: #e8f7f0;
      --success-border: #b6e4ce;
      --info: #2563eb;
      --info-bg: #eaf2ff;
      --info-border: #cfdcff;
      --info-border-hover: #dde7ff;
      --future: #9ca3af;
      --future-bg: #f0f1f4;
      --future-border: #d8dbe2;
      --proto-bg: #fff5d4;
      --proto-border: #e6c75a;
      --proto-active-bg: #6b4f00;
      --proto-active-text: #fff5d4;
      --proto-controls-btn-bg: rgba(255,255,255,.6);
      --modal-backdrop: rgba(15,23,42,.45);
      --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
      --shadow-md: 0 2px 4px rgba(15,23,42,.06), 0 6px 16px rgba(15,23,42,.08);
      --shadow-lg: 0 10px 30px rgba(15,23,42,.18);
      --radius: 10px;
    }
    [data-theme="dark"] {
      --bg: #0f1115; --surface: #1a1d23; --surface-alt: #242830; --surface-hover: #2a2f3a;
      --border: #2a2f3a; --border-strong: #3a414f;
      --text: #e5e7eb; --muted: #a3aab8; --subtle: #6b7280;
      --primary: #6c8aff; --primary-hover: #8aa1ff; --primary-soft: #1f2742; --primary-soft-border: #2a3559;
      --warning: #fbbf24; --warning-bg: #2c2410; --warning-border: #5e4a14;
      --warning-text: #fde68a; --warning-text-strong: #fef3c7;
      --danger: #f87171; --danger-bg: #3a1a1a; --danger-border: #5b2828;
      --success: #34d399; --success-bg: #112d22; --success-border: #1f5040;
      --info: #60a5fa; --info-bg: #15243f; --info-border: #28406b; --info-border-hover: #2f4a7d;
      --future: #6b7280; --future-bg: #1f242d; --future-border: #2f3540;
      --proto-bg: #3d2f10; --proto-border: #6b5210;
      --proto-active-bg: #fbbf24; --proto-active-text: #2c2410;
      --proto-controls-btn-bg: rgba(255,255,255,.06);
      --modal-backdrop: rgba(0,0,0,.6);
      --shadow-sm: 0 1px 2px rgba(0,0,0,.4), 0 1px 3px rgba(0,0,0,.5);
      --shadow-md: 0 2px 4px rgba(0,0,0,.5), 0 6px 16px rgba(0,0,0,.6);
      --shadow-lg: 0 16px 36px rgba(0,0,0,.6);
    }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", "Helvetica Neue", Arial, sans-serif;
      font-size: 14px; line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      transition: background-color .2s ease, color .2s ease;
    }
    a { color: var(--primary); text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }

    /* ===== Prototype banner =================================== */
    .proto-banner {
      position: sticky; top: 0; z-index: 50;
      background: var(--proto-bg);
      border-bottom: 1px solid var(--proto-border);
      padding: 8px 20px;
      display: flex; align-items: center; gap: 14px;
      font-size: 12px; color: var(--warning-text);
      transition: background-color .2s ease, color .2s ease, border-color .2s ease;
    }
    .proto-banner strong { color: var(--warning-text-strong); letter-spacing: .04em; }
    .proto-banner .proto-controls { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .proto-banner .proto-controls .divider { width: 1px; height: 18px; background: var(--proto-border); opacity: .8; }
    .proto-banner .proto-controls button {
      background: var(--proto-controls-btn-bg);
      border: 1px solid var(--proto-border);
      padding: 4px 10px; border-radius: 6px;
      font-size: 12px; color: var(--warning-text);
    }
    .proto-banner .proto-controls button.active {
      background: var(--proto-active-bg); color: var(--proto-active-text); border-color: var(--proto-active-bg);
    }
    .theme-toggle-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border-strong); border-radius: 999px;
      font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background-color .12s ease, border-color .12s ease, color .12s ease;
    }
    .theme-toggle-btn:hover { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
    .theme-toggle-btn .icon { font-size: 13px; line-height: 1; }

    /* ===== App shell ========================================== */
    .app-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex; align-items: center; gap: 18px;
    }
    .app-header .brand { font-weight: 700; font-size: 15px; letter-spacing: .02em; display: flex; align-items: center; gap: 8px; }
    .app-header .brand .dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; }
    .breadcrumb { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 6px; flex: 1; flex-wrap: wrap; }
    .breadcrumb a { color: var(--muted); }
    .breadcrumb .sep { color: var(--subtle); }
    .breadcrumb .current { color: var(--text); font-weight: 600; }
    .header-actions { display: flex; gap: 8px; }
    .header-actions .summary-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 10px; border-radius: 999px;
      background: var(--info-bg); color: var(--info);
      font-size: 12px; font-weight: 600;
      border: 1px solid var(--info-border); cursor: pointer;
    }
    .header-actions .summary-chip:hover { background: var(--info-border-hover); }
    main { max-width: 1280px; margin: 0 auto; padding: 24px 24px 80px; }

    /* ===== Common: section / card / button / badge ============ */
    .section { margin-bottom: 26px; }
    .section-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
    .section-header h2 { margin: 0; font-size: 16px; font-weight: 700; color: var(--text); }
    .section-header h2 .en-sub { font-size: 11.5px; font-weight: 500; color: var(--muted); margin-left: 6px; letter-spacing: .04em; }
    .section-header .desc { color: var(--muted); font-size: 13px; }
    .section-header .right { margin-left: auto; }

    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 18px; box-shadow: var(--shadow-sm);
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }
    .card.clickable:hover { cursor: pointer; transform: translateY(-1px); box-shadow: var(--shadow-md); border-color: var(--border-strong); }
    .card-title { font-size: 15px; font-weight: 700; margin: 0 0 4px; }
    .card-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); font-size: 13px; font-weight: 500; }
    .btn:hover { background: var(--surface-alt); }
    .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn.primary:hover { background: var(--primary-hover); }
    .btn.ghost { background: transparent; border: 1px dashed var(--border-strong); color: var(--muted); }
    .btn.small { padding: 4px 8px; font-size: 12px; border-radius: 6px; }
    .btn[disabled], .btn.disabled { opacity: .5; cursor: not-allowed; pointer-events: none; }

    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: .02em; border: 1px solid transparent; }
    .badge.info     { background: var(--info-bg);    color: var(--info);    border-color: var(--info-border); }
    .badge.success  { background: var(--success-bg); color: var(--success); border-color: var(--success-border); }
    .badge.warning  { background: var(--warning-bg); color: var(--warning); border-color: var(--warning-border); }
    .badge.danger   { background: var(--danger-bg);  color: var(--danger);  border-color: var(--danger-border); }
    .badge.muted    { background: var(--future-bg);  color: var(--muted);   border-color: var(--future-border); }
    .badge.future   { background: var(--future-bg);  color: var(--future);  border-color: var(--future-border); }
    .badge.dot::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; display: inline-block; }

    /* ===== Info-icon (glossary tooltip) ====================== */
    .info-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--surface-alt); border: 1px solid var(--border-strong);
      color: var(--muted); font-size: 10px; font-weight: 700;
      cursor: help; margin-left: 4px; vertical-align: 1px; user-select: none;
    }
    .info-icon:hover { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
    .glossary-pop {
      position: absolute; z-index: 200; max-width: 320px;
      background: #1f2937; color: #f3f4f6;
      padding: 10px 12px; border-radius: 8px;
      font-size: 12.5px; line-height: 1.55;
      box-shadow: 0 8px 24px rgba(15,23,42,.18);
    }
    .glossary-pop .term { font-weight: 700; color: #fbbf24; margin-bottom: 4px; }
    .glossary-pop::after { content: ""; position: absolute; top: -6px; left: 14px; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 6px solid #1f2937; }

    /* ===== Workspace Home ==================================== */
    .home-intro { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 18px; gap: 18px; }
    .home-intro h1 { margin: 0 0 4px; font-size: 22px; }
    .home-intro .lede { color: var(--muted); font-size: 13.5px; }
    .home-intro .home-actions { display: flex; gap: 8px; }
    .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
    .project-card .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .project-card .top .menu-btn { background: transparent; border: none; color: var(--subtle); padding: 2px 6px; border-radius: 6px; font-size: 16px; }
    .project-card .top .menu-btn:hover { background: var(--surface-alt); color: var(--text); }
    .project-card .status-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0 10px; }
    .project-card .next-step { font-size: 12.5px; color: var(--text); background: var(--surface-alt); border-left: 3px solid var(--primary); padding: 8px 10px; border-radius: 6px; margin-bottom: 10px; }
    .project-card .next-step .label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 2px; letter-spacing: .03em; }
    .counts-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .count-cell { text-align: center; padding: 6px 4px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface-alt); }
    .count-cell .num { font-size: 16px; font-weight: 700; line-height: 1.1; }
    .count-cell .lbl { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
    .count-cell.danger .num   { color: var(--danger); }
    .count-cell.warning .num  { color: var(--warning); }
    .count-cell.info .num     { color: var(--info); }
    .count-cell.muted .num    { color: var(--muted); }
    .ws-tools { margin-top: 36px; padding: 18px; background: var(--surface-hover); border: 1px dashed var(--border-strong); border-radius: var(--radius); }
    .ws-tools .label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
    .ws-tools .tool-card { display: flex; gap: 14px; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; cursor: pointer; transition: border-color .12s ease; }
    .ws-tools .tool-card:hover { border-color: var(--warning-border); }
    .ws-tools .tool-card .warn-tag { flex-shrink: 0; padding: 4px 10px; border-radius: 6px; background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning-border); font-size: 11px; font-weight: 700; }
    .ws-tools .tool-card .body { flex: 1; }
    .ws-tools .tool-card .title { font-weight: 600; }
    .ws-tools .tool-card .desc { color: var(--muted); font-size: 12.5px; }
    .empty-state { text-align: center; padding: 80px 20px; background: var(--surface); border: 1px dashed var(--border-strong); border-radius: var(--radius); }
    .empty-state .emoji { font-size: 36px; margin-bottom: 14px; }
    .empty-state h3 { margin: 0 0 6px; font-size: 18px; }
    .empty-state p { color: var(--muted); margin: 0 0 16px; }
    .empty-state .actions { display: inline-flex; gap: 10px; }

    /* ===== Project Dashboard (Round 2 — Next Actions priority) === */
    .pd-header { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 18px; }
    .pd-header .row1 { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .pd-header h1 { margin: 0; font-size: 20px; }
    .pd-header .phase-pill { padding: 4px 10px; border-radius: 999px; background: var(--primary-soft); color: var(--primary); font-size: 12px; font-weight: 600; border: 1px solid var(--primary-soft-border); }
    .pd-header .last-updated { margin-left: auto; color: var(--muted); font-size: 12px; }
    .pd-header .pd-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 14px; }

    /* Hero blocks: Next Actions + Blockers */
    .hero-row { display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px; margin-bottom: 18px; }
    .hero-card { padding: 18px 20px; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
    .hero-card.actions { border-left: 4px solid var(--primary); }
    .hero-card.blockers { border-left: 4px solid var(--danger); }
    .hero-card .hero-title { font-size: 14px; font-weight: 700; margin: 0 0 10px; display: flex; align-items: center; gap: 6px; }
    .hero-card.actions .hero-title { color: var(--primary); }
    .hero-card.blockers .hero-title { color: var(--danger); }
    .hero-list { list-style: none; margin: 0; padding: 0; }
    .hero-list li { padding: 8px 10px; border-radius: 6px; cursor: pointer; transition: background-color .12s ease; display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .hero-list li:hover { background: var(--surface-alt); }
    .hero-list li .arrow { margin-left: auto; color: var(--subtle); font-size: 14px; }
    .hero-list .empty { color: var(--muted); padding: 8px 10px; font-size: 13px; font-style: italic; }

    /* Scene Readiness Summary chip cluster (Round 2 NEW) */
    .readiness-summary { padding: 16px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 18px; }
    .readiness-summary .rs-title { font-size: 13.5px; font-weight: 700; margin: 0 0 4px; }
    .readiness-summary .rs-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .readiness-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .readiness-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 999px;
      font-size: 12.5px; font-weight: 600; cursor: pointer;
      border: 1px solid transparent; user-select: none;
      transition: transform .1s ease;
    }
    .readiness-chip:hover { transform: translateY(-1px); }
    .readiness-chip .count { font-weight: 800; }
    .readiness-chip.success { background: var(--success-bg); color: var(--success); border-color: var(--success-border); }
    .readiness-chip.warning { background: var(--warning-bg); color: var(--warning); border-color: var(--warning-border); }
    .readiness-chip.danger  { background: var(--danger-bg);  color: var(--danger);  border-color: var(--danger-border); }
    .readiness-chip.info    { background: var(--info-bg);    color: var(--info);    border-color: var(--info-border); }
    .readiness-chip.muted   { background: var(--future-bg);  color: var(--muted);   border-color: var(--future-border); }
    .readiness-chip.zero    { opacity: .45; cursor: default; }
    .readiness-chip.zero:hover { transform: none; }

    /* Module Status Overview — Round 1 phase grid（demoted to mid priority） */
    .state-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 18px; }
    .state-card .state-title { display: flex; align-items: center; gap: 8px; font-weight: 600; margin-bottom: 4px; }
    .state-card .state-detail { font-size: 12.5px; color: var(--muted); }

    /* Triplet (HD / Canon Delta / Agent reading) */
    .triplet { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .triplet .card { display: flex; flex-direction: column; }
    .mini-list { font-size: 12.5px; }
    .mini-list .item { padding: 6px 8px; border-radius: 6px; background: var(--surface-alt); margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; }
    .mini-list .item:hover { border-color: var(--border-strong); }
    .mini-list .item .title { font-weight: 500; }
    .mini-list .item .meta { color: var(--muted); font-size: 11.5px; margin-top: 2px; }
    .mini-list.empty { color: var(--muted); padding: 8px; }

    /* Module Navigation cards (demoted to bottom secondary) */
    .module-nav-collapsed { background: var(--surface-alt); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .module-nav-collapsed .mn-title { font-size: 13px; font-weight: 700; margin: 0 0 4px; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; }
    .module-nav-collapsed .mn-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
    .module-card { position: relative; min-height: 100px; display: flex; flex-direction: column; padding: 12px 14px; }
    .module-card .mod-title { font-size: 13.5px; font-weight: 600; margin-bottom: 4px; }
    .module-card .mod-desc { color: var(--muted); font-size: 12px; flex: 1; }
    .module-card .mod-footer { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
    .module-card.future { background: var(--future-bg); border-style: dashed; color: var(--muted); cursor: not-allowed; }
    .module-card.future:hover { transform: none; box-shadow: var(--shadow-sm); }
    .module-card.future .mod-title { color: var(--muted); }
    .future-tag { position: absolute; top: 8px; right: 8px; padding: 2px 7px; border-radius: 4px; background: var(--future-border); color: var(--muted); font-size: 10.5px; font-weight: 700; letter-spacing: .04em; }

    /* ===== Scene Queue (Round 2 NEW) ========================== */
    .sq-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }
    .sq-header h1 { margin: 0; font-size: 20px; }
    .sq-header .lede { color: var(--muted); font-size: 12.5px; margin-top: 4px; }
    .sq-header .sq-meta { color: var(--muted); font-size: 12px; }
    .sq-filter-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 18px; align-items: center; }
    .sq-filter-row .fl-label { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-right: 4px; }
    .sq-filter-chip {
      padding: 4px 12px; border-radius: 999px; font-size: 12.5px; font-weight: 600;
      cursor: pointer; user-select: none;
      background: var(--surface-alt); color: var(--muted); border: 1px solid var(--border);
    }
    .sq-filter-chip:hover { background: var(--primary-soft); color: var(--primary); border-color: var(--primary); }
    .sq-filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .sq-chapter-group { margin-bottom: 24px; }
    .sq-chapter-header { font-size: 13px; font-weight: 700; color: var(--muted); margin: 0 0 10px; padding-bottom: 6px; border-bottom: 1px dashed var(--border-strong); letter-spacing: .04em; }
    .scene-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 12px; }
    .scene-card { padding: 14px 16px; }
    .scene-card .sc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
    .scene-card .sc-pos { font-size: 11px; color: var(--muted); padding: 2px 8px; background: var(--surface-alt); border-radius: 4px; font-family: SFMono-Regular, Consolas, monospace; }

  <!-- Application script -->
  <script>
  (function () {
    "use strict";

    /* =====================================================================
     * 0. Helpers
     * ===================================================================== */
    const $ = (sel, root = document) => root.querySelector(sel);
    const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
    const escapeHtml = (s) => String(s == null ? '' : s).replace(/[&<>"']/g,
      c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function gloss(term) {
      return `<span class="info-icon" data-glossary="${escapeHtml(term)}" tabindex="0" role="button" aria-label="說明：${escapeHtml(term)}">?</span>`;
    }
    function mockAction(label, detail) {
      const msg = `[MOCK] ${label}` + (detail ? `\n\n${detail}` : '') +
        '\n\n（這是 prototype mock 互動，不寫真資料、不操作真 repo。）';
      alert(msg);
    }
    function projectById(id) { return window.MOCK.projects.find(p => p.id === id); }
    function sceneInProject(p, sid) { return p && p.scenes && p.scenes.find(s => s.id === sid); }
    function readinessLabel(key) {
      const r = window.MOCK.readinessLabels[key];
      return r ? r : { label: key, tone: 'muted' };
    }
    // Dialogue status → 中文 mock label
    const dialogueStatusLabels = {
      not_started: ['muted', '未開始'],
      v01_drafts: ['info', 'v01 試寫'],
      v02_convergence: ['info', 'v02 收斂'],
      final: ['success', 'FINAL'],
    };
    const taskStatusLabels = {
      planned: ['muted', '計畫中'],
      in_progress: ['info', '撰寫中'],
      human_approved: ['success', '人類已核准'],
      blocked: ['danger', '阻塞'],
    };
    const qaStatusLabels = {
      na: ['muted', 'N/A'],
      pending: ['muted', '尚未跑'],
      partial_pass: ['info', '部分通過'],
      review_required: ['warning', '需審核'],
      pass: ['success', 'PASS'],
    };

    /* =====================================================================
     * 1. Hash router
     *    Routes:
     *      #/home                                → Workspace Home
     *      #/home?empty=1                        → Workspace Home empty state
     *      #/project/<id>                        → Project Dashboard (Round 2 重排)
     *      #/project/<id>/scene-queue            → Scene Queue (Round 2 NEW，主入口)
     *      #/project/<id>/scene-queue?filter=X   → filtered Scene Queue
     *      #/project/<id>/scene/<sid>            → Scene Detail (Round 2 NEW)
     *      #/project/<id>/scene-dialogue         → 場景索引快速概覽（legacy 表格）
     *      #/templates                           → 公版 Harness / 模板管理 preview
     * ===================================================================== */
    const router = {
      current: { name: 'home', params: {}, query: {} },
      parse() {
        const raw = (location.hash || '#/home').replace(/^#/, '');
        const [path, qs] = raw.split('?');
        const query = {};
        (qs || '').split('&').filter(Boolean).forEach(p => {
          const [k, v] = p.split('=');
          query[decodeURIComponent(k)] = decodeURIComponent(v || '');
        });
        const parts = path.split('/').filter(Boolean);
        if (parts.length === 0 || parts[0] === 'home') return { name: 'home', params: {}, query };
        if (parts[0] === 'templates') return { name: 'templates', params: {}, query };
        if (parts[0] === 'project' && parts[1]) {
          if (parts[2] === 'scene-queue') return { name: 'scene-queue', params: { projectId: parts[1] }, query };
          if (parts[2] === 'scene-dialogue') return { name: 'scene-dialogue', params: { projectId: parts[1] }, query };
          if (parts[2] === 'scene' && parts[3]) return { name: 'scene-detail', params: { projectId: parts[1], sceneId: parts[3] }, query };
          return { name: 'project', params: { projectId: parts[1] }, query };
        }
        return { name: 'home', params: {}, query };
      },
      go(path) { location.hash = path; },
      onChange(handler) { window.addEventListener('hashchange', handler); },
    };

    /* =====================================================================
     * 2. Glossary popover
     * ===================================================================== */
    let activePop = null;
    function closePop() { if (activePop) { activePop.remove(); activePop = null; } }
    document.addEventListener('click', (e) => {
      const trig = e.target.closest('[data-glossary]');
      if (trig) {
        e.stopPropagation();
        closePop();
        const term = trig.getAttribute('data-glossary');
        const def = (window.MOCK.glossary || {})[term] || '（無說明）';
        const pop = document.createElement('div');
        pop.className = 'glossary-pop';
        pop.innerHTML = `<div class="term">${escapeHtml(term)}</div><div>${escapeHtml(def)}</div>
          <div style="margin-top:6px;font-size:10.5px;color:#9ca3af;">點擊任意處關閉</div>`;
        document.body.appendChild(pop);
        const rect = trig.getBoundingClientRect();
        pop.style.left = Math.max(8, rect.left + window.scrollX - 8) + 'px';
        pop.style.top = (rect.bottom + window.scrollY + 8) + 'px';
        activePop = pop;
        return;
      }
      if (activePop && !e.target.closest('.glossary-pop')) closePop();
    });

    /* =====================================================================
     * 3. Modal infrastructure (Round 2 NEW)
     *    開關真做。內部 action 仍是 mock alert。
     * ===================================================================== */
    function openModal({ tag, tagLabel, title, body, actions }) {
      closeModal();
      const root = $('#modal-root');
      const tagClass = tag || 'qa';
      const actionsHtml = (actions || []).map(a => `
        <button class="btn ${a.primary ? 'primary' : ''}" data-modal-action="${escapeHtml(a.id)}">${escapeHtml(a.label)}</button>
      `).join('');
      root.innerHTML = `
        <div class="modal-backdrop" data-modal-backdrop>
          <div class="modal-card" role="dialog" aria-modal="true">
            <div class="modal-head">
              <span class="modal-tag ${tagClass}">${escapeHtml(tagLabel || '')}</span>
              <h3 class="modal-title">${escapeHtml(title || '')}</h3>
              <button class="modal-close" data-modal-close aria-label="關閉">×</button>
            </div>
            <div class="modal-body">${body || ''}</div>
            <div class="modal-foot">
              <span class="mock-tag">所有按鈕為 mock — 不寫真資料</span>
              ${actionsHtml}
              <button class="btn" data-modal-close>關閉</button>
            </div>
          </div>
        </div>
      `;
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      const root = $('#modal-root');
      if (root) root.innerHTML = '';
      document.body.style.overflow = '';
    }
    document.addEventListener('click', (e) => {
      if (e.target.closest('[data-modal-close]')) { closeModal(); return; }
      if (e.target.matches('[data-modal-backdrop]')) { closeModal(); return; }
      const actEl = e.target.closest('[data-modal-action]');
      if (actEl) {
        const aid = actEl.getAttribute('data-modal-action');
        mockAction(`Modal 內動作：${aid}`, '本動作為 mock，不寫真資料。');
      }
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    /* =====================================================================
     * 4. Theme toggle
     * ===================================================================== */
    const themeBtn = $('#theme-toggle');
    function getTheme() { return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light'; }
    function applyTheme(mode) {
      if (mode === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      else document.documentElement.removeAttribute('data-theme');
      try { localStorage.setItem('narrative-ws-theme', mode); } catch (_) {}
      syncThemeBtn();
    }
    function syncThemeBtn() {
      const t = getTheme();
      const icon = themeBtn.querySelector('.icon');
      const label = themeBtn.querySelector('.label');
      if (t === 'dark') { icon.textContent = '☀'; label.textContent = 'Light'; themeBtn.title = '切換到亮色主題'; }
      else { icon.textContent = '🌙'; label.textContent = 'Dark'; themeBtn.title = '切換到深色主題'; }
    }
    themeBtn.addEventListener('click', () => applyTheme(getTheme() === 'dark' ? 'light' : 'dark'));
    syncThemeBtn();

    /* =====================================================================
     * 5. Empty state toggle
     * ===================================================================== */
    const emptyBtn = $('#toggle-empty');
    function syncEmptyBtn() {
      const empty = (router.parse().query.empty === '1');
      emptyBtn.textContent = empty ? '開啟（顯示 empty）' : '關閉（顯示專案）';
      emptyBtn.classList.toggle('active', empty);
    }
    emptyBtn.addEventListener('click', () => {
      const r = router.parse();
      const empty = r.query.empty === '1';
      router.go(empty ? '#/home' : '#/home?empty=1');
    });

    /* =====================================================================
     * 6. Header / breadcrumb
     * ===================================================================== */
    function renderBreadcrumb(route) {
      const wrap = $('#breadcrumb');
      const actions = $('#header-actions');
      wrap.innerHTML = '';
      actions.innerHTML = '';
      const home = `<a href="#/home">工作區首頁</a>`;
      if (route.name === 'home') {
        wrap.innerHTML = `<span class="current">工作區首頁</span>`;
        const ws = window.MOCK.workspace;
        actions.innerHTML = `
          <span class="summary-chip" data-action="cross-decisions">跨專案待裁決 ${ws.crossProjectPendingDecisions}</span>`;
      } else if (route.name === 'templates') {
        wrap.innerHTML = `${home} <span class="sep">/</span> <span class="current">公版 Harness / 模板管理</span>`;
      } else if (route.name === 'project') {
        const p = projectById(route.params.projectId);
        wrap.innerHTML = `${home} <span class="sep">/</span> <span class="current">${escapeHtml(p ? p.name : route.params.projectId)}</span>`;
      } else if (route.name === 'scene-queue') {
        const p = projectById(route.params.projectId);
        wrap.innerHTML = `${home} <span class="sep">/</span>
          <a href="#/project/${escapeHtml(route.params.projectId)}">${escapeHtml(p ? p.name : route.params.projectId)}</a>
          <span class="sep">/</span> <span class="current">場景列隊 / Scene Queue</span>`;
      } else if (route.name === 'scene-detail') {
        const p = projectById(route.params.projectId);
        const s = sceneInProject(p, route.params.sceneId);
        wrap.innerHTML = `${home} <span class="sep">/</span>
          <a href="#/project/${escapeHtml(route.params.projectId)}">${escapeHtml(p ? p.name : route.params.projectId)}</a>
          <span class="sep">/</span>
          <a href="#/project/${escapeHtml(route.params.projectId)}/scene-queue">場景列隊</a>
          <span class="sep">/</span> <span class="current">${escapeHtml(s ? s.title : route.params.sceneId)}</span>`;
      } else if (route.name === 'scene-dialogue') {
        const p = projectById(route.params.projectId);
        wrap.innerHTML = `${home} <span class="sep">/</span>
          <a href="#/project/${escapeHtml(route.params.projectId)}">${escapeHtml(p ? p.name : route.params.projectId)}</a>
          <span class="sep">/</span> <span class="current">場景索引快速覽（legacy）</span>`;
      }
    }

    /* =====================================================================
     * 7. View: Workspace Home（沿用 Round 1.1）
     * ===================================================================== */

      const empty = router.current.query.empty === '1';

        projectListHtml = `

              <button class="btn primary" data-action="create-project">＋ 新增專案</button>

            </div>

      }

        <div class="home-intro">
          <div>
            <h1>工作區首頁 <span style="color:var(--muted);font-weight:500;font-size:14px;">/ Workspace Home</span></h1>

    /* =====================================================================

    function renderProjectDashboard() {

      // Scene Readiness Summary chips（B1: chip 群）
      const readinessSummary = computeReadinessSummary(p);
      const chipKeys = ['READY', 'READY_WITH_RISK', 'BLOCKED', 'AWAITING_DECISION', 'AWAITING_DATA', 'DRAFT_PENDING_QA', 'QA_NEEDS_REWRITE'];
      const chipsHtml = chipKeys.map(k => {
        const cnt = readinessSummary[k] || 0;
        const meta = readinessLabel(k);
        return `
          <span class="readiness-chip ${meta.tone} ${cnt === 0 ? 'zero' : ''}"
                data-nav="#/project/${escapeHtml(p.id)}/scene-queue?filter=${escapeHtml(k)}"

            ${escapeHtml(meta.label)}
            <span class="count">${cnt}</span>
          </span>`;
      }).join('');
      const totalScenes = (p.scenes || []).length;

      // Module Status Overview (Round 1 phase grid) — 6 區塊
      const phaseBlocks = [
        { title: '原始資料導入', val: p.sourceImport, icon: '📥' },
        { title: `${gloss('Bible')} 整理`, val: p.bibleStatus, icon: '📚' },
        { title: '劇情 / 章節結構', val: p.plotStatus, icon: '🧭' },
        { title: '場景索引', val: p.sceneStatus, icon: '🗺' },
        { title: '台詞生產', val: p.dialogueStatus, icon: '✍' },
        { title: 'QA', val: p.qaStatus, icon: '✓' },
      ].map(b => `
        <div class="card state-card">
          <div class="state-title">${b.icon} ${b.title}
            <span class="badge muted" style="margin-left:auto">${escapeHtml(b.val.state)}</span>
          </div>
          <div class="state-detail">${escapeHtml(b.val.detail)}</div>
        </div>
      `).join('');

      // Triplet
      const decisionsHtml = (p.humanDecisionItems || []).length
        ? p.humanDecisionItems.map(d => `
          <div class="item" data-action="hd-item" data-id="${escapeHtml(d.id)}">
            <div class="title">${escapeHtml(d.summary)}</div>
            <div class="meta">${escapeHtml(d.area)} · 優先級 ${escapeHtml(d.priority)}</div>
          </div>`).join('')
        : '<div class="mini-list empty">目前無待裁決事項。</div>';
      const canonHtml = (p.canonDeltaItems || []).length
        ? p.canonDeltaItems.map(c => `
          <div class="item" data-action="canon-item" data-id="${escapeHtml(c.id)}">
            <div class="title">${escapeHtml(c.summary)}</div>
            <div class="meta">${escapeHtml(c.state)} · 影響：${escapeHtml(c.impact)}</div>
          </div>`).join('')
        : '<div class="mini-list empty">目前無 Canon Delta 候選。</div>';
      const readingHtml = (p.agentPreTaskReadingList || []).length
        ? p.agentPreTaskReadingList.map(r => `
          <div class="item" data-action="reading-item">

          </div>`).join('')

      // Module Navigation (demoted)
      const modulesHtml = window.MOCK.moduleDefs.map(m => {
        if (m.future) return `
          <div class="card module-card future" data-action="future-module" data-mid="${escapeHtml(m.id)}">
            <div class="future-tag">FUTURE</div>
            <div class="mod-title">${escapeHtml(m.label)}</div>
            <div class="mod-desc">${escapeHtml(m.desc)}</div>
          </div>`;
        const navHash = m.id === 'scene-dialogue' ? `#/project/${p.id}/scene-queue` : null;
        const clickAttr = navHash ? `data-nav="${navHash}"` : `data-action="module-preview" data-mid="${escapeHtml(m.id)}" data-pid="${escapeHtml(p.id)}"`;
        const subline = m.id === 'scene-dialogue'
          ? '<div style="font-size:11.5px;color:var(--muted);margin-top:4px;">Round 2 主入口：Scene Queue</div>'
          : '';
        return `
          <div class="card module-card clickable" ${clickAttr}>
            <div class="mod-title">${escapeHtml(m.label)}</div>
            <div class="mod-desc">${escapeHtml(m.desc)}</div>
            ${subline}
          </div>`;
      }).join('');

      return `
        <div class="pd-header">
          <div class="row1">
            <h1>${escapeHtml(p.name)}</h1>
            <span class="phase-pill">階段：${escapeHtml(p.phase)}</span>
            <span class="badge muted">${escapeHtml(p.status)}</span>
            <span class="last-updated">最近更新 ${escapeHtml(p.lastUpdated)}</span>
          </div>
          <div class="pd-summary">
            <div class="count-cell ${p.blockers > 0 ? 'danger' : 'muted'}"><div class="num">${p.blockers}</div><div class="lbl">Blockers</div></div>
            <div class="count-cell ${p.pendingDecisions > 0 ? 'warning' : 'muted'}"><div class="num">${p.pendingDecisions}</div><div class="lbl">${gloss('Human Decision')}</div></div>
            <div class="count-cell ${p.qaFindings > 0 ? 'info' : 'muted'}"><div class="num">${p.qaFindings}</div><div class="lbl">QA Findings</div></div>
            <div class="count-cell ${p.canonDeltaCandidates > 0 ? 'info' : 'muted'}"><div class="num">${p.canonDeltaCandidates}</div><div class="lbl">${gloss('Canon Delta')}</div></div>
          </div>
        </div>

        <!-- HERO row：Next Actions + Blockers -->
        <div class="hero-row">
          <div class="hero-card actions">
            <h3 class="hero-title">▸ 下一步建議 / Next Actions</h3>
            ${actionsHtml}
          </div>
          <div class="hero-card blockers">
            <h3 class="hero-title">⚠ 卡點 · 風險 <span style="font-weight:500;color:var(--muted);font-size:11.5px;margin-left:6px;">/ Blockers · Risks</span></h3>
            ${blockersHtml}
          </div>
        </div>

        <!-- Scene Readiness Summary（chip 群） -->
        <div class="readiness-summary">
          <h3 class="rs-title">${gloss('Scene Readiness')} 場景就緒度總覽 <span style="font-weight:500;color:var(--muted);font-size:12px;">/ Scene Readiness Summary</span></h3>
          <div class="rs-desc">總共 ${totalScenes} 場。點任一狀態 chip 進入 Scene Queue 並套上篩選。</div>
          <div class="readiness-chips">${chipsHtml}</div>
        </div>

        <!-- Module Status Overview（demoted to mid priority） -->
        <div class="section">
          <div class="section-header">
            <h2>模組狀態總覽<span class="en-sub">Module Status Overview</span></h2>
            <span class="desc">六個生產階段目前狀態。這是狀態判讀，不是入口導航。</span>
          </div>
          <div class="state-grid">${phaseBlocks}</div>
        </div>

        <!-- Triplet：HD / Canon Delta / Agent Reading -->
        <div class="section">
          <div class="triplet">
            <div class="card">
              <div class="card-title">${gloss('Human Decision')} 待裁決</div>
              <div class="mini-list">${decisionsHtml}</div>
            </div>
            <div class="card">
              <div class="card-title">${gloss('Canon Delta')} 候選</div>
              <div class="mini-list">${canonHtml}</div>
            </div>
            <div class="card">
              <div class="card-title">Agent 任務啟動前必讀</div>
              <div class="mini-list">${readingHtml}</div>
            </div>
          </div>
        </div>

        <!-- Module Navigation（demoted） -->
        <div class="module-nav-collapsed">
          <div class="mn-title">模組導航 / Module Navigation</div>
          <div class="mn-desc">次要入口。Round 2 主流程是 Next Actions → Scene Queue → Scene Detail；這裡保留各模組總覽入口。</div>
          <div class="module-grid">${modulesHtml}</div>
        </div>
      `;
    }

    // 計算 readiness 計數（純 derived）
    function computeReadinessSummary(p) {
      const summary = { READY:0, READY_WITH_RISK:0, BLOCKED:0, AWAITING_DECISION:0, AWAITING_DATA:0, DRAFT_PENDING_QA:0, QA_NEEDS_REWRITE:0 };
      (p.scenes || []).forEach(s => {
        const k = s.readiness && s.readiness.badge;
        if (k && summary[k] !== undefined) summary[k] += 1;
      });
      return summary;
    }

    /* =====================================================================
     * 9. View: Scene Queue (Round 2 NEW)
     *    Filter chips + chapter grouping
     * ===================================================================== */
    function renderSceneQueue() {
      const p = projectById(router.current.params.projectId);
      if (!p) return '<div class="placeholder-note">找不到 project。</div>';
      const filter = router.current.query.filter || '';
      const allScenes = p.scenes || [];
      const filtered = filter ? allScenes.filter(s => s.readiness && s.readiness.badge === filter) : allScenes;

      // Filter chips
      const summary = computeReadinessSummary(p);
      const allChip = `<span class="sq-filter-chip ${filter === '' ? 'active' : ''}" data-nav="#/project/${escapeHtml(p.id)}/scene-queue">全部 <span class="count">${allScenes.length}</span></span>`;
      const chipKeys = ['READY', 'READY_WITH_RISK', 'BLOCKED', 'AWAITING_DECISION', 'AWAITING_DATA', 'DRAFT_PENDING_QA', 'QA_NEEDS_REWRITE'];
      const chips = chipKeys.map(k => {
        const cnt = summary[k] || 0;
        const meta = readinessLabel(k);
        return `<span class="sq-filter-chip ${filter === k ? 'active' : ''}" data-nav="#/project/${escapeHtml(p.id)}/scene-queue?filter=${escapeHtml(k)}">${escapeHtml(meta.label)} <span class="count">${cnt}</span></span>`;
      }).join('');

      // Group by chapter
      const byChapter = {};
      filtered.forEach(s => { const c = s.chapter || 0; if (!byChapter[c]) byChapter[c] = []; byChapter[c].push(s); });
      const chapters = Object.keys(byChapter).sort((a,b) => Number(a) - Number(b));
      const groupsHtml = chapters.length === 0
        ? '<div class="placeholder-note">符合此篩選的場景：0 場。試試其他狀態 chip。</div>'
        : chapters.map(c => `
          <div class="sq-chapter-group">
            <h3 class="sq-chapter-header">第 ${escapeHtml(c)} 章 · CH${String(c).padStart(2,'0')}</h3>
            <div class="scene-card-grid">
              ${byChapter[c].sort((a,b) => (a.position||0) - (b.position||0)).map(renderSceneCardForQueue).join('')}
            </div>
          </div>`).join('');

      return `
        <div class="sd-back"><a href="#/project/${escapeHtml(p.id)}">← 回 ${escapeHtml(p.name)} Dashboard</a></div>
        <div class="sq-header">
          <div>
            <h1>${gloss('Scene Queue')} 場景列隊 <span style="color:var(--muted);font-weight:500;font-size:14px;">/ Scene Queue</span></h1>
            <div class="lede">場景 / 台詞生產工作區的 Round 2 主入口。把場景視為 ${gloss('Production Loop')} 中的 production unit。</div>
          </div>
          <div class="sq-meta">${escapeHtml(p.name)} · 共 ${allScenes.length} 場 · 顯示 ${filtered.length} 場</div>
        </div>

        <div class="sq-filter-row">
          <span class="fl-label">篩選</span>
          ${allChip}
          ${chips}
        </div>

        ${groupsHtml}
      `;
    }

    function renderSceneCardForQueue(s) {
      const meta = readinessLabel(s.readiness ? s.readiness.badge : 'BLOCKED');
      // production mini-strip：6 個 step（goal / bible / task / beats / dialogue / qa）
      // ⚠ 這只是 UI workflow visualization，不是狀態機。
      const stripKeys = ['goal', 'bible', 'task', 'beats', 'dialogue', 'qa'];
      const cmap = {};
      (s.readiness && s.readiness.checklist || []).forEach(c => { cmap[c.id] = c.status; });
      const stripHtml = stripKeys.map(k => {
        let cls = 'na';
        if (k === 'dialogue') {
          cls = s.dialogueStatus && s.dialogueStatus !== 'not_started' ? 'ok' : 'na';
        } else {
          const st = cmap[k];
          if (st === 'ok') cls = 'ok';
          else if (st === 'partial' || st === 'review') cls = 'partial';
          else if (st === 'missing' || st === 'conflict' || st === 'blocked') cls = 'bad';
        }
        return `<div class="step ${cls}" title="${escapeHtml(k)}: ${escapeHtml(cmap[k] || 'na')}"></div>`;
      }).join('');
      const counts = [];
      if (s.qaFindings && s.qaFindings.length) counts.push(`<span class="badge info">QA ${s.qaFindings.length}</span>`);
      if (s.humanDecisions && s.humanDecisions.length) counts.push(`<span class="badge warning">HD ${s.humanDecisions.length}</span>`);
      if (s.canonDeltas && s.canonDeltas.length) counts.push(`<span class="badge info">Canon Δ ${s.canonDeltas.length}</span>`);
      if (s.blockers && s.blockers.length) counts.push(`<span class="badge danger">Blockers ${s.blockers.length}</span>`);
      const next = s.nextAction ? `<div class="sc-next">▸ ${escapeHtml(s.nextAction.label)}</div>` : '';
      return `
        <div class="card scene-card clickable" data-nav="#/project/${escapeHtml(router.current.params.projectId)}/scene/${escapeHtml(s.id)}">
          <div class="sc-top">
            <h3 class="sc-title">${escapeHtml(s.title)}</h3>
            <span class="badge ${meta.tone}">${escapeHtml(meta.label)}</span>
          </div>
          <div class="sc-pos">CH${String(s.chapter).padStart(2,'0')}_S${String(s.position).padStart(2,'0')}</div>
          <p class="sc-purpose">${escapeHtml(s.dramaticPurpose)}</p>
          <div class="sc-strip" title="Workflow visualization (UX only — 不是狀態機)">${stripHtml}</div>
          <div class="sc-counts">${counts.join('') || '<span class="badge muted">無待處理</span>'}</div>
          ${next}
        </div>`;
    }

    /* =====================================================================
     * 10. View: Scene Detail (Round 2 NEW) — Scene Production Cockpit
     * ===================================================================== */
    function renderSceneDetail() {
      const p = projectById(router.current.params.projectId);
      const s = sceneInProject(p, router.current.params.sceneId);
      if (!p || !s) return `<div class="placeholder-note">找不到 scene：${escapeHtml(router.current.params.sceneId)}。 <a href="#/project/${escapeHtml(router.current.params.projectId)}/scene-queue">回 Scene Queue</a></div>`;

      const meta = readinessLabel(s.readiness ? s.readiness.badge : 'BLOCKED');

      // ─── 主欄 ───
      // (1) Scene Header
      const headerHtml = `
        <div class="sd-back"><a href="#/project/${escapeHtml(p.id)}/scene-queue">← 回場景列隊</a></div>
        <div class="sd-header">
          <div class="sd-pos">CH${String(s.chapter).padStart(2,'0')}_S${String(s.position).padStart(2,'0')}</div>
          <h1>${escapeHtml(s.title)}</h1>
          <div class="sd-row">
            <span class="rp-badge ${meta.tone}">${escapeHtml(meta.label)}</span>
            <span class="badge muted">${escapeHtml(p.name)}</span>
          </div>
        </div>`;

      // (2) Scene Goal / Dramatic Purpose
      const goalHtml = `
        <div class="sd-block">
          <h3 class="sd-block-title">${gloss('Dramatic Purpose')} 戲劇目的 <span style="font-weight:500;color:var(--muted);font-size:11.5px;margin-left:6px;">/ Scene Goal</span></h3>
          <div style="font-size:13.5px;line-height:1.6;">${escapeHtml(s.dramaticPurpose)}</div>
        </div>`;

      // (3) Readiness Panel: badge + checklist + next fix
      const iconMap = { ok:'✓', partial:'◐', missing:'○', conflict:'⚠', blocked:'⚠', review:'◑', na:'—' };
      const checklistHtml = (s.readiness && s.readiness.checklist || []).map(c => `
        <li>
          <span class="icon ${escapeHtml(c.status)}">${iconMap[c.status] || '·'}</span>
          <span class="label">
            ${escapeHtml(c.label)}
            ${c.detail ? `<div class="detail">${escapeHtml(c.detail)}</div>` : ''}
          </span>
        </li>`).join('');
      const readinessHtml = `
        <div class="sd-block">
          <h3 class="sd-block-title">${gloss('Scene Readiness')} 場景就緒度 <span style="font-weight:500;color:var(--muted);font-size:11.5px;margin-left:6px;">/ Scene Readiness Panel</span></h3>
          <div class="rp-row">
            <span class="rp-badge ${meta.tone}">${escapeHtml(meta.label)}</span>
            <span style="color:var(--muted);font-size:12px;">這是 UX label，不是 enum。同場景可能同時有多個狀態信號。</span>
          </div>
          <ul class="checklist">${checklistHtml}</ul>
          ${s.readiness && s.readiness.nextFix ? `
            <div class="next-fix">
              <span class="label">Next Fix</span>${escapeHtml(s.readiness.nextFix)}
            </div>` : ''}
        </div>`;

      // (4) Required Context
      const ctx = s.requiredContext || {};
      const ctxParts = [];
      if (ctx.warnings && ctx.warnings.length) {
        ctxParts.push(ctx.warnings.map(w => `<div class="ctx-warning ${w.type === 'missing' || w.type === 'conflict' ? 'danger' : ''}">⚠ ${escapeHtml(w.text)}</div>`).join(''));
      }
      if (ctx.bibleRefs && ctx.bibleRefs.length) {
        ctxParts.push(`
          <div class="ctx-section">
            <div class="ctx-title">Bible References ${gloss('Bible')}</div>
            <ul class="ctx-list">${ctx.bibleRefs.map(r => `
              <li>
                <span class="lbl">${escapeHtml(r.label)}</span>
                <a class="ref-link" data-action="ref-link" data-ref="${escapeHtml(r.section)}">查看 →</a>
                <span class="meta">${escapeHtml(r.section)}</span>
              </li>`).join('')}</ul>
          </div>`);
      }
      if (ctx.characters && ctx.characters.length) {
        ctxParts.push(`
          <div class="ctx-section">
            <div class="ctx-title">參與角色 / Characters</div>
            <ul class="ctx-list">${ctx.characters.map(c => `
              <li>
                <span class="lbl">${escapeHtml(c.name)}</span>
                <span style="color:var(--muted);font-size:11.5px;">${escapeHtml(c.role)}</span>
                <span class="meta"><span class="badge ${c.voiceCardStatus === 'LOCKED' ? 'success' : (c.voiceCardStatus === 'REVIEW' ? 'info' : 'muted')}">聲線卡 ${escapeHtml(c.voiceCardStatus)}</span></span>
              </li>`).join('')}</ul>
          </div>`);
      }
      if (ctx.relationships && ctx.relationships.length) {
        ctxParts.push(`
          <div class="ctx-section">
            <div class="ctx-title">角色關係 / Relationships</div>
            <ul class="ctx-list">${ctx.relationships.map(r => `
              <li>
                <span class="lbl">${escapeHtml(r.pair)}</span>
                <span style="color:var(--muted);font-size:11.5px;">${escapeHtml(r.summary)}</span>
                <span class="meta"><span class="badge ${r.status === 'conflict' ? 'danger' : 'success'}">${r.status === 'conflict' ? '衝突' : 'OK'}</span></span>
              </li>`).join('')}</ul>
          </div>`);
      }
      if (ctx.worldVocab && ctx.worldVocab.length) {
        ctxParts.push(`
          <div class="ctx-section">
            <div class="ctx-title">世界詞彙 / World Vocab</div>
            <ul class="ctx-list">${ctx.worldVocab.map(v => `
              <li><span class="lbl">「${escapeHtml(v.term)}」</span><span style="color:var(--muted);font-size:11.5px;">${escapeHtml(v.state)}</span></li>`).join('')}</ul>
          </div>`);
      }
      if (ctx.infoReveal && ctx.infoReveal.length) {
        ctxParts.push(`
          <div class="ctx-section">
            <div class="ctx-title">資訊揭露限制 / Info Reveal</div>
            <ul class="ctx-list">${ctx.infoReveal.map(i => `
              <li>
                <span style="font-size:12.5px;">${escapeHtml(i.note)}</span>
                <span class="meta"><span class="badge ${i.priority === 'high' ? 'danger' : 'warning'}">${escapeHtml(i.priority)}</span></span>
              </li>`).join('')}</ul>
          </div>`);
      }
      const requiredCtxHtml = `
        <div class="sd-block">
          <h3 class="sd-block-title">必要脈絡 <span style="font-weight:500;color:var(--muted);font-size:11.5px;margin-left:6px;">/ Required Context · Bible Reference (mock)</span></h3>
          ${ctxParts.length ? ctxParts.join('') : '<div class="placeholder-note">本場暫無必要脈絡資料（mock）。</div>'}
        </div>`;

      // (5) Beat / Outline Preview
      const beatsOutlineHtml = (s.beats && s.beats.length) ? `
        <div class="sd-block">
          <h3 class="sd-block-title">Beat 與大綱預覽 ${gloss('Beat')}<span style="font-weight:500;color:var(--muted);font-size:11.5px;margin-left:6px;">/ Beat / Outline Preview</span></h3>
          ${s.beats.map(b => `
            <div class="beat-block">
              <div class="beat-head">
                <span class="beat-title">${escapeHtml(b.title)}</span>
                <span class="badge ${(dialogueStatusLabels[b.dialogueStatus] || ['muted','—'])[0]}">${(dialogueStatusLabels[b.dialogueStatus] || ['muted','—'])[1]}</span>
              </div>
              <div class="beat-meta"><strong>Purpose：</strong>${escapeHtml(b.purpose)}</div>
              <div class="beat-meta"><strong>Emotional turn：</strong>${escapeHtml(b.emotionalTurn)}</div>
              <div class="beat-meta"><strong>Info reveal：</strong>${escapeHtml(b.infoRevealNote)}</div>
            </div>`).join('')}
        </div>` : '';

      // (6) Dialogue Draft Preview — read-only with disabled actions
      const draftHtml = (s.beats && s.beats.length) ? `
        <div class="sd-block dialogue-preview">
          <h3 class="sd-block-title">${gloss('Dialogue Draft Preview')}台詞草稿預覽 <span style="font-weight:500;color:var(--muted);font-size:11.5px;margin-left:6px;">/ Dialogue Draft Preview · read-only</span></h3>
          <div class="preview-banner">📖 此為 scene / beat context 下的台詞 preview。本輪 prototype 不是完整 Dialogue Editor，所有 lock / rewrite / reorder 動作皆 disabled。</div>
          ${s.beats.map(b => `
            <div style="margin-bottom:18px;">
              <div style="font-weight:700;font-size:13px;margin-bottom:6px;color:var(--muted);">${escapeHtml(b.title)}</div>
              ${b.lines && b.lines.length ? `
                <ul class="lines-list">${b.lines.map(l => `
                  <li>
                    <span class="speaker">${escapeHtml(l.speaker)}</span>
                    <span class="line-text">${escapeHtml(l.preview)}</span>
                    <span class="line-tags">
                      ${l.qaWarning ? `<span class="qa-tag ${escapeHtml(l.qaWarning.severity)}" title="${escapeHtml(l.qaWarning.note)}">QA</span>` : ''}
                      ${l.infoRevealTag ? `<span class="info-tag" title="${escapeHtml(l.infoRevealTag.note || l.infoRevealTag.type)}">info</span>` : ''}
                      <button class="line-action-btn" disabled title="(mock — 本輪不執行)">🔒</button>
                      <button class="line-action-btn" disabled title="(mock — 本輪不執行)">↻</button>
                      <button class="line-action-btn" disabled title="(mock — 本輪不執行)">⇅</button>
                    </span>
                  </li>`).join('')}</ul>` : '<div class="empty-beat">此 beat 尚無 mock dialogue line。</div>'}
            </div>`).join('')}
        </div>` : '';

      const mainCol = headerHtml + `<div class="sd-main">${goalHtml}${readinessHtml}${requiredCtxHtml}${beatsOutlineHtml}${draftHtml}</div>`;

      // ─── 側欄 ───
      const sideHtml = renderSceneDetailSide(p, s);

      return `
        ${headerHtml}
        <div class="sd-layout">
          <div class="sd-main">${goalHtml}${readinessHtml}${requiredCtxHtml}${beatsOutlineHtml}${draftHtml}</div>
          <div class="sd-side">${sideHtml}</div>
        </div>
      `;
    }

    function renderSceneDetailSide(p, s) {
      // 1. Next Action
      const naHtml = s.nextAction ? `
        <div class="sd-block">
          <h3 class="sd-block-title">下一步 / Next Action</h3>
          <div class="next-action-card" data-action="scene-next-action" data-target="${escapeHtml(s.nextAction.target)}" data-pid="${escapeHtml(p.id)}" data-sid="${escapeHtml(s.id)}" data-hd="${escapeHtml(s.nextAction.hdId || '')}" data-qa="${escapeHtml(s.nextAction.qaId || '')}" data-aaid="${escapeHtml(s.nextAction.agentActionId || '')}">
            <div class="label">下一步</div>
            <div class="text">${escapeHtml(s.nextAction.label)}</div>
          </div>
        </div>` : '';

      // 2. Blockers
      const bkHtml = `
        <div class="sd-block">
          <h3 class="sd-block-title">⚠ 卡點 <span style="font-weight:500;color:var(--muted);font-size:11.5px;margin-left:6px;">/ Blockers</span></h3>
          ${(s.blockers && s.blockers.length) ? `
            <ul class="summary-list">${s.blockers.map(b => `
              <li data-action="scene-blocker" data-bid="${escapeHtml(b.id)}">
                <div class="title">${escapeHtml(b.text)}</div>
                <div class="meta">${escapeHtml(b.area)}</div>
              </li>`).join('')}</ul>`
            : '<div class="summary-list empty">本場無 blockers。</div>'}
        </div>`;

      // 3. QA Findings Summary
      const qaSummary = s.qaFindings && s.qaFindings.length ? `
        ${s.qaFindings.length} 項 finding，其中 ${s.qaFindings.filter(q => q.severity === 'high').length} 項 high-risk。
      ` : '本場無 open QA finding。';
      const qaListHtml = (s.qaFindings && s.qaFindings.length) ? `
        <ul class="summary-list">${s.qaFindings.map(q => `
          <li data-action="open-qa" data-qaid="${escapeHtml(q.id)}" data-pid="${escapeHtml(p.id)}" data-sid="${escapeHtml(s.id)}">
            <div class="title">
              <span class="badge ${q.severity === 'high' ? 'danger' : 'warning'}">${escapeHtml(q.severity)}</span>
              ${escapeHtml(q.title)}
            </div>
            <div class="meta">影響：${escapeHtml(q.affected ? `${q.affected.beatId}/${q.affected.lineId}` : '—')}</div>
          </li>`).join('')}</ul>` : '<div class="summary-list empty">本場無 open QA finding。</div>';
      const qaHtml = `
        <div class="sd-block">
          <h3 class="sd-block-title">QA 結果 <span style="font-weight:500;color:var(--muted);font-size:11.5px;margin-left:6px;">/ QA Findings</span><span class="right" style="font-size:11px;color:var(--muted);font-weight:500;">${escapeHtml(qaSummary)}</span></h3>
          ${qaListHtml}
        </div>`;

      // 4. Human Decision Summary
      const hdHtml = `
        <div class="sd-block">
          <h3 class="sd-block-title">${gloss('Human Decision')} 待裁決</h3>
          ${(s.humanDecisions && s.humanDecisions.length) ? `
            <ul class="summary-list">${s.humanDecisions.map(d => `
              <li data-action="open-hd" data-hdid="${escapeHtml(d.id)}" data-pid="${escapeHtml(p.id)}" data-sid="${escapeHtml(s.id)}">
                <div class="title">
                  <span class="badge ${d.blocking ? 'danger' : 'warning'}">${d.blocking ? 'blocking' : 'non-blocking'}</span>
                  ${escapeHtml(d.title)}
                </div>
                <div class="meta">${escapeHtml(d.area)} · ${escapeHtml(d.priority)}</div>
              </li>`).join('')}</ul>`
            : '<div class="summary-list empty">本場無待裁決事項。</div>'}
        </div>`;

      // 5. Canon Delta Summary
      const cdHtml = `
        <div class="sd-block">
          <h3 class="sd-block-title">${gloss('Canon Delta')} 候選</h3>
          ${(s.canonDeltas && s.canonDeltas.length) ? `
            <ul class="summary-list">${s.canonDeltas.map(c => `
              <li data-action="open-cd" data-cdid="${escapeHtml(c.id)}" data-pid="${escapeHtml(p.id)}" data-sid="${escapeHtml(s.id)}">
                <div class="title">${escapeHtml(c.title)}</div>
                <div class="meta">${escapeHtml(c.state)} · 來源：${escapeHtml(c.source)}</div>
              </li>`).join('')}</ul>`
            : '<div class="summary-list empty">本場無 Canon Delta 候選。</div>'}
        </div>`;

      // 6. Mock Agent Actions
      const aaHtml = `
        <div class="sd-block">
          <h3 class="sd-block-title">Agent 動作 <span style="font-weight:500;color:var(--muted);font-size:11.5px;margin-left:6px;">/ Mock Agent Actions</span><span class="right" style="font-size:11px;color:var(--muted);font-weight:500;">所有動作為 mock</span></h3>
          ${(s.agentActions && s.agentActions.length) ? s.agentActions.map(a => `
            <div class="agent-action ${a.enabled ? '' : 'disabled'}" data-action="agent-action" data-aaid="${escapeHtml(a.id)}" data-pid="${escapeHtml(p.id)}" data-sid="${escapeHtml(s.id)}">
              <span>${a.enabled ? '▸' : '⊘'}</span>
              <span class="agent-text">${escapeHtml(a.label)}</span>
              ${a.warning ? `<span class="warn">⚠ ${escapeHtml(a.warning)}</span>` : ''}
            </div>`).join('') : '<div class="summary-list empty">本場無 mock agent actions。</div>'}
        </div>`;

      return `<div class="side-block">${naHtml}${bkHtml}${qaHtml}${hdHtml}${cdHtml}${aaHtml}</div>`;
    }

    /* =====================================================================
     * 11. View: Scene Dialogue (legacy quick overview)
     * ===================================================================== */
    function renderSceneDialogue() {
      const p = projectById(router.current.params.projectId);
      if (!p) return '<div class="placeholder-note">找不到 project。</div>';
      const rows = (p.scenes || []).map(s => {
        const r = readinessLabel(s.readiness ? s.readiness.badge : 'BLOCKED');
        const t = taskStatusLabels[s.taskStatus] || ['muted', s.taskStatus];
        const d = dialogueStatusLabels[s.dialogueStatus] || ['muted', s.dialogueStatus];
        const q = qaStatusLabels[s.qa] || ['muted', s.qa];
        return `
          <tr>
            <td><strong>${escapeHtml(s.title)}</strong><br><span style="color:var(--muted);font-size:11.5px">${escapeHtml(s.id)}</span></td>
            <td><span class="badge ${r.tone}">${escapeHtml(r.label)}</span></td>
            <td><span class="badge ${t[0]}">${escapeHtml(t[1])}</span></td>
            <td><span class="badge ${d[0]}">${escapeHtml(d[1])}</span></td>
            <td><span class="badge ${q[0]}">${escapeHtml(q[1])}</span></td>
            <td>${s.humanDecisionsCount || 0}</td>
            <td>${s.canonDeltaCount || 0}</td>
            <td><a class="btn small" href="#/project/${escapeHtml(p.id)}/scene/${escapeHtml(s.id)}">詳情 →</a></td>
          </tr>`;
      }).join('');
      const emptyRow = (p.scenes && p.scenes.length === 0)
        ? `<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:20px">本專案尚無場景索引。</td></tr>` : '';
      return `
        <div class="sd-back"><a href="#/project/${escapeHtml(p.id)}">← 回 ${escapeHtml(p.name)} Dashboard</a></div>
        <div class="section">
          <div class="section-header">
            <h2>場景索引快速覽<span class="en-sub">Legacy quick overview</span></h2>
            <span class="desc">Round 2 主入口已切換為 <a href="#/project/${escapeHtml(p.id)}/scene-queue">場景列隊 / Scene Queue</a>。本表保留供比較。</span>
          </div>
          <table class="scene-table">
            <thead>
              <tr>
                <th style="min-width:200px">場景</th>
                <th>${gloss('Scene Readiness')}</th>
                <th>${gloss('Scene Task')}</th>
                <th>台詞</th>
                <th>QA</th>
                <th>HD</th>
                <th>Canon Δ</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>${rows}${emptyRow}</tbody>
          </table>
        </div>`;
    }

    /* =====================================================================
     * 12. View: 公版 Harness / 模板管理
     * ===================================================================== */
    function renderTemplates() {
      const ws = window.MOCK.workspace;
      const sectionsHtml = ws.templateLayerEntry.sections.map(s => `
        <div class="card clickable" data-action="template-section" data-sid="${escapeHtml(s.id)}">
          <div class="card-title">${escapeHtml(s.label)}</div>
          <div class="card-meta">點擊進入 placeholder（mock）</div>
          <div class="placeholder-note">本輪 prototype 不展開正式編輯器。</div>
        </div>`).join('');
      return `
        <div class="section">
          <div class="section-header">
            <h2>${escapeHtml(ws.templateLayerEntry.label)} ${gloss('公版 Harness')}<span class="en-sub">Workspace Tools</span></h2>
            <span class="desc">這是 Workspace 工具層，不是某個專案的 Bible。</span>
          </div>
          <div class="templates-warning">
            <strong>⚠ 高風險區域。</strong> ${escapeHtml(ws.templateLayerEntry.warning)}<br>
            一般作品內的規則調整應優先放在 <em>project-specific protocol</em>，而不是這裡。
          </div>
          <div class="template-section-grid">${sectionsHtml}</div>
        </div>`;
    }

    /* =====================================================================
     * 13. Action handlers
     * ===================================================================== */
    document.addEventListener('click', (e) => {
      // 路由級切換
      const navEl = e.target.closest('[data-nav]');
      if (navEl) {
        e.preventDefault();
        router.go(navEl.getAttribute('data-nav'));
        return;
      }
      const actEl = e.target.closest('[data-action]');
      if (!actEl) return;
      const action = actEl.getAttribute('data-action');

      // ── Project Dashboard / Workspace Home ──
      if (action === 'create-project')   return mockAction('新增專案', '會開啟新專案表單（mock）。');
      if (action === 'sort-projects')    return mockAction('排序專案', 'mock 切換排序方式。');
      if (action === 'project-menu')     return mockAction('專案選單', '封存 / 隱藏 / 刪除（mock）。');
      if (action === 'cross-decisions')  return mockAction('跨專案待裁決', 'mock 跨 project 摘要。本輪不定義 HD 儲存層。');
      if (action === 'next-action') {
        const target = actEl.getAttribute('data-target');
        const pid = actEl.getAttribute('data-pid');
        const sid = actEl.getAttribute('data-sid');
        const hd = actEl.getAttribute('data-hd');
        if (target === 'scene-detail' && sid) return router.go(`#/project/${pid}/scene/${sid}`);
        if (target === 'scene-queue') return router.go(`#/project/${pid}/scene-queue`);
        if (target === 'scene-dialogue') return router.go(`#/project/${pid}/scene-dialogue`);
        return mockAction('Next Action', `會切換到對應模組：${target}（mock）。`);
      }
      if (action === 'blocker') {
        const sid = actEl.getAttribute('data-sid');
        const pid = actEl.getAttribute('data-pid');
        if (sid) return router.go(`#/project/${pid}/scene/${sid}`);
        return mockAction('Blocker 詳情', '會展開詳細與處理建議（mock）。');
      }
      if (action === 'hd-item')          return mockAction('Human Decision 詳情', 'project-level HD 詳情（mock）。AI 不能代決。');
      if (action === 'canon-item')       return mockAction('Canon Delta 候選', 'project-level Canon Delta 詳情（mock）。');
      if (action === 'reading-item')     return mockAction('Agent 必讀文件', '會打開該文件 preview（mock）。本輪不讀真 repo。');
      if (action === 'module-preview') {
        const mid = actEl.getAttribute('data-mid');
        return mockAction(`模組 preview：${mid}`, '本輪僅 Project Dashboard / Scene Queue / Scene Detail / Templates 有畫面。');
      }
      if (action === 'future-module')    return mockAction('未來功能', '此模組標記為 Future / optional。');
      if (action === 'template-section') return mockAction(`公版區塊：${actEl.getAttribute('data-sid')}`, '會打開該區塊編輯器（mock）。');

      // ── Scene Detail：side action / next action / agent ──
      if (action === 'scene-next-action') {
        const target = actEl.getAttribute('data-target');
        const pid = actEl.getAttribute('data-pid');
        const sid = actEl.getAttribute('data-sid');
        const hd = actEl.getAttribute('data-hd');
        const qa = actEl.getAttribute('data-qa');
        const aaid = actEl.getAttribute('data-aaid');
        if (target === 'modal-hd' && hd) return openHdModal(pid, sid, hd);
        if (target === 'modal-qa' && qa) return openQaModal(pid, sid, qa);
        if (target === 'agent-action') return mockAction(`Agent action: ${aaid}`, '本動作為 mock。');
        return mockAction('Scene Next Action', `target=${target}（mock）。`);
      }
      if (action === 'scene-blocker')    return mockAction('Blocker 詳情（scene）', '會展開該 blocker（mock）。');
      if (action === 'open-qa') {
        return openQaModal(actEl.getAttribute('data-pid'), actEl.getAttribute('data-sid'), actEl.getAttribute('data-qaid'));
      }
      if (action === 'open-hd') {
        return openHdModal(actEl.getAttribute('data-pid'), actEl.getAttribute('data-sid'), actEl.getAttribute('data-hdid'));
      }
      if (action === 'open-cd') {
        return openCdModal(actEl.getAttribute('data-pid'), actEl.getAttribute('data-sid'), actEl.getAttribute('data-cdid'));
      }
      if (action === 'agent-action') {
        if (actEl.classList.contains('disabled')) return;
        return mockAction(`Agent action: ${actEl.getAttribute('data-aaid')}`, '本動作為 mock，不啟動真 Agent、不寫真資料、不生成真台詞。');
      }
      if (action === 'ref-link') {
        return mockAction(`Bible reference: ${actEl.getAttribute('data-ref')}`, '本輪不接真 Bible，僅顯示 mock 引用。');
      }
    });

    /* =====================================================================
     * 14. Modal openers (Round 2)
     * ===================================================================== */
    function openQaModal(pid, sid, qaid) {
      const p = projectById(pid); const s = sceneInProject(p, sid);
      const q = (s && s.qaFindings || []).find(x => x.id === qaid);
      if (!q) return mockAction('找不到 QA finding', `qaid=${qaid}`);
      const body = `
        <div class="meta-row">
          <span><span class="badge ${q.severity === 'high' ? 'danger' : 'warning'}">${escapeHtml(q.severity)}</span></span>
          <span>影響：${escapeHtml(q.affected ? `${q.affected.beatId} / ${q.affected.lineId}` : '—')}</span>
        </div>
        <div class="summary-text">${escapeHtml(q.summary)}</div>
        <div class="ref-info">
          ⚠ 此處顯示的「affected」只是 UX 引用，不定義正式 line_id schema。<br>
          所有 mock action 皆不寫真檔、不執行真 QA。
        </div>`;
      const actions = [
        { id: 'view-line', label: 'view affected line' },
        { id: 'create-hd', label: '轉為 Human Decision', primary: true },
        { id: 'request-rewrite', label: 'request rewrite' },
      ];
      openModal({ tag: 'qa', tagLabel: 'QA 結果 / QA Finding', title: q.title, body, actions });
    }
    function openHdModal(pid, sid, hdid) {
      const p = projectById(pid); const s = sceneInProject(p, sid);
      const d = (s && s.humanDecisions || []).find(x => x.id === hdid);
      if (!d) return mockAction('找不到 Human Decision', `hdid=${hdid}`);
      const body = `
        <div class="meta-row">
          <span><span class="badge ${d.blocking ? 'danger' : 'warning'}">${d.blocking ? 'blocking' : 'non-blocking'}</span></span>
          <span>area：${escapeHtml(d.area)}</span>
          <span>priority：${escapeHtml(d.priority)}</span>
        </div>
        <div class="summary-text">${escapeHtml(d.preview)}</div>
        <div class="ref-info">
          ⚠ Human Decision 必須由人類拍板。AI / Agent 不能自行 resolve。<br>
          以下動作為 mock，不寫真 decision lifecycle。
        </div>`;
      const actions = [
        { id: 'accept', label: '接受（mock）', primary: true },
        { id: 'reject', label: '拒絕（mock）' },
        { id: 'defer', label: '延後（mock）' },
      ];
      openModal({ tag: 'hd', tagLabel: '人類裁決 / Human Decision', title: d.title, body, actions });
    }
    function openCdModal(pid, sid, cdid) {
      const p = projectById(pid); const s = sceneInProject(p, sid);
      const c = (s && s.canonDeltas || []).find(x => x.id === cdid);
      if (!c) return mockAction('找不到 Canon Delta candidate', `cdid=${cdid}`);
      const body = `
        <div class="meta-row">
          <span><span class="badge info">${escapeHtml(c.state)}</span></span>
          <span>source：${escapeHtml(c.source)}</span>
        </div>
        <div class="summary-text">${escapeHtml(c.preview || '（無 preview）')}</div>
        <div class="ref-info">
          影響：${escapeHtml(c.impact || '—')}<br>
          ⚠ Canon Delta 接受/拒絕需由人類最終決定，且回寫動作不在本輪 prototype 範圍。
        </div>`;
      const actions = [
        { id: 'accept-write', label: '接受並回寫（mock）', primary: true },
        { id: 'reject', label: '拒絕（mock）' },
        { id: 'revise', label: '修改後再審（mock）' },
      ];
      openModal({ tag: 'cd', tagLabel: 'Canon Delta 候選', title: c.title, body, actions });
    }

    /* =====================================================================
     * 15. Render dispatcher
     * ===================================================================== */
    function render() {
      router.current = router.parse();
      renderBreadcrumb(router.current);
      const root = $('#app-root');
      switch (router.current.name) {
        case 'home':           root.innerHTML = renderHome(); break;
        case 'project':        root.innerHTML = renderProjectDashboard(); break;
        case 'scene-queue':    root.innerHTML = renderSceneQueue(); break;
        case 'scene-detail':   root.innerHTML = renderSceneDetail(); break;
        case 'scene-dialogue': root.innerHTML = renderSceneDialogue(); break;
        case 'templates':      root.innerHTML = renderTemplates(); break;
        default:               root.innerHTML = '<div class="placeholder-note">未知路由。<a href="#/home">回首頁</a></div>';
      }
      syncEmptyBtn();
      window.scrollTo({ top: 0, behavior: 'instant' });
    }
    router.onChange(render);
    render();
  })();
  </script>
</body>
</html>
